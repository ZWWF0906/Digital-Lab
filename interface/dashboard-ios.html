<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<title>Digital Lab</title>
<style>

:root{--bg:#000;--bg2:#1C1C1E;--bg3:#2C2C2E;--bg4:#3A3A3C;--blue:#0A84FF;--green:#30D158;--orange:#FF9F0A;--red:#FF453A;--fg:rgba(255,255,255,.92);--fg2:rgba(255,255,255,.6);--fg3:rgba(255,255,255,.3);--r:24px;--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
h2{font-size:22px;font-weight:600;letter-spacing:-.01em;margin-bottom:20px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:10px}
.nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(28,28,30,.72);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid rgba(255,255,255,.08);z-index:100;display:flex;align-items:center;padding:0 24px}
.nav h1{font-size:17px;font-weight:600;letter-spacing:-.01em}
.nav .dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:8px;animation:breathe 2s ease-in-out infinite}
.nav .desc{font-size:12px;color:var(--fg2);margin-left:12px}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.side{position:fixed;top:56px;left:0;bottom:0;width:252px;background:var(--bg);border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;z-index:99;padding:8px 12px 24px}
.side .sg{margin-top:12px}
.side .st{font-size:10px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.08em;padding:8px 12px 4px}
.side a{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;color:var(--fg);font-size:14px;text-decoration:none;transition:background .15s;cursor:pointer;font-weight:450}
.side a:hover{background:var(--bg2)}
.side a.active{background:rgba(10,132,255,.18);color:var(--blue)}
.side a .ico{width:24px;text-align:center;font-size:14px;opacity:.7}
.side a.active .ico{opacity:1}
.side .divider{height:1px;background:rgba(255,255,255,.06);margin:8px 12px}
.main{margin-left:252px;margin-top:56px;padding:24px 28px 60px}
.card{background:var(--bg2);border-radius:var(--r);padding:24px;transition:transform .3s ease-out,box-shadow .3s ease-out;will-change:transform}
.card:hover{transform:translateY(-2px)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card.anim{animation:fadeInUp .5s cubic-bezier(.25,.1,.25,1) both}
.ring-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
.ring-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px 20px;cursor:default}
.ring-card svg{display:block}
.ring-card .val{font-size:36px;font-weight:300;letter-spacing:-.02em;margin-top:-96px;transition:color .6s cubic-bezier(.25,.1,.25,1)}
.ring-card .lbl{font-size:13px;font-weight:500;color:var(--fg2);margin-top:4px}
.ring-card .sub{font-size:11px;color:var(--fg3);margin-top:2px}
.ring-card .trend{font-size:12px;font-weight:500;margin-top:8px;display:flex;align-items:center;gap:4px}
.chart-box{background:var(--bg2);border-radius:var(--r);padding:20px 24px 16px;margin-bottom:24px}
.chart-box .toolbar{display:flex;gap:6px;margin-bottom:16px;align-items:center}
.toolbar .seg{display:flex;background:var(--bg3);border-radius:10px;padding:2px}
.toolbar .seg span{padding:6px 15px;border-radius:8px;font-size:13px;font-weight:500;color:var(--fg2);cursor:pointer;transition:.2s;user-select:none}
.toolbar .seg span.on{background:var(--bg4);color:var(--fg);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toolbar .rt{font-size:11px;color:var(--fg3);margin-left:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;font-weight:400}
tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.panel{display:none}.panel.on{display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 18px;border-radius:20px;border:none;font:500 13px var(--font);cursor:pointer;transition:transform .15s,opacity .15s,box-shadow .15s;color:var(--fg);background:var(--bg3)}
.btn:active{transform:scale(.96)}
.btn.blue{background:var(--blue);color:#fff}
.btn.green{background:var(--green);color:#000}
.btn.red{background:var(--red);color:#fff}
.btn+.btn{margin-left:8px}
.msg{background:var(--bg2);border-radius:16px;padding:16px 20px;margin:8px 0;font:13px/1.6 'SF Mono','Cascadia Code','Consolas',monospace;white-space:pre-wrap;color:var(--fg2)}
.msg.good{border-left:3px solid var(--green);color:var(--fg)}
.empty{text-align:center;padding:48px 20px;color:var(--fg3)}
.empty h3{font-size:16px;font-weight:500;color:var(--fg2);margin-bottom:6px}
.empty p{font-size:13px;color:var(--fg3)}
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat-item{background:var(--bg2);border-radius:16px;padding:16px 20px;min-width:120px}
.stat-item .lbl{font-size:11px;color:var(--fg3);font-weight:500;margin-bottom:4px}
.stat-item .num{font-size:22px;font-weight:600;color:var(--fg)}
input[type=text]{padding:8px 14px;border:1px solid var(--bg4);border-radius:10px;background:var(--bg);color:var(--fg);font:400 13px var(--font);outline:none;transition:border .2s;width:160px}
input[type=text]:focus{border-color:var(--blue)}
@media(max-width:900px){.side{width:200px}.main{margin-left:200px}.ring-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.side{display:none}.main{margin-left:0;padding:16px}.ring-grid{grid-template-columns:1fr}.nav{padding:0 16px}}
</style>
</head>
<body>
<nav class="nav">
<span class="dot"></span>
<h1>Digital Lab</h1>
<span class="desc" id="nav-desc">System Monitor</span>
</nav>
<div class="side">
<div class="sg">
<div class="st">基础</div>
<a href="#" onclick="loadPanel('init');return false" data-panel="init"><span class="ico">⚙</span>初始化</a>
<a href="#" onclick="loadPanel('status');return false" data-panel="status"><span class="ico">ℹ</span>系统状态</a>
<a href="#" onclick="loadPanel('config-panel');return false" data-panel="config-panel"><span class="ico">⚒</span>配置管理</a>
</div>
<div class="sg">
<div class="st">监控</div>
<a href="#" onclick="loadPanel('home');return false" data-panel="home" class="active"><span class="ico">◉</span>仪表盘</a>
<a href="#" onclick="loadPanel('processes');return false" data-panel="processes"><span class="ico">▣</span>进程 Top 15</a>
<a href="#" onclick="loadPanel('alerts');return false" data-panel="alerts"><span class="ico">⚠</span>告警记录</a>
<a href="#" onclick="loadPanel('alert-test');return false" data-panel="alert-test"><span class="ico">▶</span>告警测试</a>
<a href="#" onclick="loadPanel('daemon');return false" data-panel="daemon"><span class="ico">⟳</span>守护进程</a>
<a href="#" onclick="loadPanel('compare');return false" data-panel="compare"><span class="ico">⦿</span>历史对比</a>
</div>
<div class="sg">
<div class="st">工具</div>
<a href="#" onclick="loadPanel('launcher');return false" data-panel="launcher"><span class="ico">➥</span>快捷启动</a>
<a href="#" onclick="loadPanel('report');return false" data-panel="report"><span class="ico">☰</span>生成报告</a>
</div>
<div class="sg">
<div class="st">其他</div>
<a href="#" onclick="loadPanel('experiment');return false" data-panel="experiment"><span class="ico">○</span>实验管理</a>
<a href="#" onclick="loadPanel('analyze');return false" data-panel="analyze"><span class="ico">∨</span>数据分析</a>
<a href="#" onclick="loadPanel('ai');return false" data-panel="ai"><span class="ico">✦</span>AI 助手</a>
</div>
</div>
<div class="main">
<div class="panel" id="p-home"></div>
<div class="panel" id="p-processes"></div>
<div class="panel" id="p-alerts"></div>
<div class="panel" id="p-init"></div>
<div class="panel" id="p-status"></div>
<div class="panel" id="p-config-panel"></div>
<div class="panel" id="p-daemon"></div>
<div class="panel" id="p-alert-test"></div>
<div class="panel" id="p-compare"></div>
<div class="panel" id="p-launcher"></div>
<div class="panel" id="p-report"></div>
<div class="panel" id="p-experiment"></div>
<div class="panel" id="p-analyze"></div>
<div class="panel" id="p-ai"></div>
</div>
<script>
var API = '/api';
var CP = 'home';
var CR = '1h';
var PLOTLY_READY = false;
var RING_KEYS = ['cpu','memory','disk'];
var RING_LABELS = ['CPU','内存','磁盘'];
var RING_COLORS = ['#FF453A','#30D158','#0A84FF'];
var _prev = {cpu:0,memory:0,disk:0};

/* ---- helpers ---- */
function $(id){return document.getElementById(id)}
function api(url,method,data){
    var o={};
    if(method){o.method=method;o.headers={'Content-Type':'application/json'};if(data)o.body=JSON.stringify(data)}
    return fetch(API+url,o).then(function(r){return r.json()})
}
function fmt(n){if(!n)return'0 B';var u=['B','KB','MB','GB','TB'];for(var i=0;i<u.length;i++){if(Math.abs(n)<1024)return n.toFixed(1)+' '+u[i];n/=1024}return n.toFixed(1)+' PB'}
function showEmpty(id,msg){msg=msg||'No data';var el=$('p-'+id);if(el)el.innerHTML='<div class="empty"><h3>'+msg+'</h3></div>'}

/* ---- panel switcher ---- */
function panel(id){
    var ps=document.querySelectorAll('.panel');
    for(var i=0;i<ps.length;i++)ps[i].classList.remove('on');
    var el=$('p-'+id);if(el)el.classList.add('on');
    var as=document.querySelectorAll('.side a');
    for(var i=0;i<as.length;i++)as[i].classList.remove('active');
    var lnk=document.querySelector('[data-panel="'+id+'"]');
    if(lnk)lnk.classList.add('active')
}
function loadPanel(id){
    panel(id);CP=id;
    var m={'home':H,'processes':P,'alerts':AL,'init':I,'status':ST,'config-panel':CF,'daemon':D,'alert-test':AT,'compare':CMP,'launcher':LA,'report':RP};
    if(m[id])m[id]()
}

/* ---- SVG ring builder ---- */
function ringSVG(pct,color,size){
    size=size||120;var r=(size-16)/2;var circ=2*Math.PI*r;
    var svg='<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">';
    svg+='<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="var(--bg3)" stroke-width="7" stroke-linecap="round"/>';
    svg+='<circle id="ring-'+color.replace('#','')+'" cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="7" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" transform="rotate(-90 '+size/2+' '+size/2+')" style="transition:stroke-dashoffset 1.5s cubic-bezier(0.25,0.1,0.25,1)"/>';
    svg+='</svg>';
    return {html:svg,circ:circ,size:size,color:color}
}

/* ---- animate ring ---- */
function animateRing(id,toPct){
    var el=$('ring-'+id.replace('#',''));
    if(!el)return;
    var circ=2*Math.PI*((120-16)/2);
    setTimeout(function(){el.setAttribute('stroke-dashoffset',circ*(1-toPct/100))},50)
}

/* ---- ring color ---- */
function ringClr(key,val){
    var t={cpu:[60,85],memory:[70,90],disk:[80,95]}[key]||[60,85];
    if(val>t[1])return 'var(--red)';
    if(val>t[0])return 'var(--orange)';
    return key==='cpu'?'var(--red)':key==='memory'?'var(--green)':'var(--blue)'
}

/* ---- trend calc ---- */
function trend(key,val){
    var p=_prev[key];_prev[key]=val;
    if(p===0)return'<span style="color:var(--fg3)">—</span>';
    var d=val-p;
    if(Math.abs(d)<0.5)return'<span style="color:var(--fg3)">→ '+Math.abs(d).toFixed(1)+'</span>';
    var arrow=d>0?'↑':'↓';
    var clr=d>0?'var(--red)':'var(--green)';
    return'<span style="color:'+clr+'">'+arrow+' '+Math.abs(d).toFixed(1)+'%</span>'
}

/* ---- refresh loop ---- */
function RF(){if(CP==='home'){X();if(PLOTLY_READY)CH(CR)}else if(CP==='processes')P();else if(CP==='alerts')AL()}

/* ---- current metrics (update rings) ---- */
function X(){
    api('/current').then(function(d){
        if(!d||d.error)return;
        for(var i=0;i<3;i++){
            var key=RING_KEYS[i],val=Math.min(d[key]||0,100);
            var el=$('rv-'+key);if(el)el.textContent=val.toFixed(1)+'%';
            var clr=ringClr(key,val);
            el=$('rv-'+key);if(el)el.style.color=clr;
            el=$('rt-'+key);if(el)el.innerHTML=trend(key,val);
            animateRing(RING_COLORS[i],val)
        }
        var nav=$('nav-desc');if(nav)nav.textContent='CPU '+d.cpu.toFixed(0)+'%  ·  Mem '+d.memory.toFixed(0)+'%  ·  Disk '+d.disk.toFixed(0)+'%'
    })
}

/* ---- dashboard ---- */
function H(){
    panel('home');
    var s='<div class="ring-grid">';
    for(var i=0;i<3;i++){
        var key=RING_KEYS[i],lbl=RING_LABELS[i],clr=RING_COLORS[i];
        var r=ringSVG(0,clr,120);
        s+='<div class="card anim ring-card" style="animation-delay:'+(i*0.08)+'s">';
        s+=r.html;
        s+='<div class="val" id="rv-'+key+'" style="color:var(--fg)">--</div>';
        s+='<div class="lbl">'+lbl+'</div>';
        s+='<div class="trend" id="rt-'+key+'"></div>';
        s+='</div>'
    }
    s+='</div>';
    s+='<div class="card anim chart-box" style="animation-delay:0.24s">';
    s+='<div class="toolbar"><div class="seg">';
    s+='<span class="on" onclick="CH(&quot;1h&quot;,this)">1h</span>';
    s+='<span onclick="CH(&quot;24h&quot;,this)">24h</span>';
    s+='<span onclick="CH(&quot;7d&quot;,this)">7d</span>';
    s+='<span onclick="CH(&quot;30d&quot;,this)">30d</span>';
    s+='</div><span class="rt">auto-refresh 30s</span></div>';
    s+='<div id="chart" style="min-height:360px"></div></div>';
    $('p-home').innerHTML=s;
    X();CH('1h')
}

function CH(range,btn){
    CR=range;
    var bs=document.querySelectorAll('.seg span');
    for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');
    if(btn)btn.classList.add('on');
    if(!PLOTLY_READY)return;
    api('/data?range='+range).then(function(d){
        if(!d||!d.times||!d.times.length||d.error){
            $('chart').innerHTML='<div class="empty"><h3>No chart data</h3><p>Start background collector first</p></div>';
            return
        }
        $('chart').innerHTML='';
        Plotly.newPlot('chart',[
            {x:d.times,y:d.cpu,name:'CPU',line:{color:'#FF453A',width:1.5},fill:'tozeroy',fillcolor:'rgba(255,69,58,.08)'},
            {x:d.times,y:d.memory,name:'Memory',line:{color:'#30D158',width:1.5},fill:'tozeroy',fillcolor:'rgba(48,209,88,.08)'},
            {x:d.times,y:d.disk,name:'Disk',line:{color:'#0A84FF',width:1.5},fill:'tozeroy',fillcolor:'rgba(10,132,255,.08)'}
        ],{
            paper_bgcolor:'#1C1C1E',plot_bgcolor:'#1C1C1E',
            font:{color:'rgba(255,255,255,.6)',size:11,family:'Inter'},
            margin:{t:10,r:16,b:36,l:48},
            xaxis:{gridcolor:'rgba(255,255,255,.05)',tickformat:'%m/%d %H:%M',linecolor:'rgba(255,255,255,.1)'},
            yaxis:{gridcolor:'rgba(255,255,255,.05)',title:'%',range:[0,100],linecolor:'rgba(255,255,255,.1)',zerolinecolor:'rgba(255,255,255,.1)'},
            legend:{orientation:'h',y:1.14,font:{size:11}},
            hovermode:'x unified',
            hoverlabel:{bgcolor:'rgba(28,28,30,.95)',bordercolor:'transparent',font:{size:12,color:'#fff'},borderradius:12}
        },{responsive:true,displayModeBar:false})
    })
}

/* ---- processes ---- */
function P(){api('/processes').then(function(d){if(!d||!Array.isArray(d)||!d.length){showEmpty('processes');return}var h='<h2>Processes</h2><table><tr><th>PID</th><th>Name</th><th>CPU</th><th>Mem</th><th>RSS</th></tr>';for(var i=0;i<d.length;i++){var p=d[i];h+='<tr><td>'+p.pid+'</td><td>'+(p.name||'')+'</td><td>'+p.cpu.toFixed(1)+'%</td><td>'+p.memory.toFixed(1)+'%</td><td>'+fmt(p.rss)+'</td></tr>'}h+='</table>';$('p-processes').innerHTML=h}).catch(function(){showEmpty('processes')})}

/* ---- alerts ---- */
function AL(){api('/alerts').then(function(d){if(!d||!Array.isArray(d)||!d.length){showEmpty('alerts','No alerts');return}var h='<h2>Alerts</h2><table><tr><th>Time</th><th>Metric</th><th>Value</th><th>Threshold</th></tr>';for(var i=0;i<d.length;i++){var a=d[i],dt=a.data||{};h+='<tr><td>'+a.timestamp+'</td><td>'+a.message+'</td><td>'+(dt.current||0).toFixed(1)+'%</td><td>'+dt.threshold+'%</td></tr>'}h+='</table>';$('p-alerts').innerHTML=h}).catch(function(){showEmpty('alerts')})}

/* ---- init ---- */
function I(){var h='<h2>Initialize</h2><div class="empty"><p>Create directory structure: tools/logs/experiments/notes/archive/interface</p><br><button class="btn green" onclick="doInit()">Initialize</button><div id="init-msg"></div></div>';$('p-init').innerHTML=h}
function doInit(){api('/init','POST').then(function(d){$('init-msg').innerHTML='<div class="msg'+(d.ok?' good':'')+'">'+(d.msg||'')+'</div>'})}

/* ---- status ---- */
function ST(){api('/status').then(function(d){if(!d)return;var h='<h2>System Status</h2><div class="stat-row">';h+='<div class="stat-item"><div class="lbl">Python</div><div class="num" style="font-size:16px">'+(d.python||'')+'</div></div>';h+='<div class="stat-item"><div class="lbl">System</div><div class="num" style="font-size:16px">'+(d.platform||'')+'</div></div>';h+='</div>';h+='<div style="font-size:13px;line-height:1.8;color:var(--fg2)">'+(d.dirs||[]).join('<br>')+'</div>';h+='<div class="msg">'+(d.config||'')+'</div>';$('p-status').innerHTML=h}).catch(function(){showEmpty('status')})}

/* ---- config ---- */
function CF(){api('/config').then(function(d){if(!d)return;var h='<h2>Configuration</h2><button class="btn blue" onclick="doConfigSave()">Save Config</button><div id="cfg-msg"></div>';h+='<div class="msg" style="max-height:500px;overflow-y:auto;margin-top:12px">'+JSON.stringify(d,null,2)+'</div>';$('p-config-panel').innerHTML=h}).catch(function(){showEmpty('config-panel')})}
function doConfigSave(){api('/config','POST',{}).then(function(d){$('cfg-msg').innerHTML='<div class="msg">'+(d.msg||'')+'</div>'})}

/* ---- daemon ---- */
function D(){var h='<h2>Daemon</h2>';h+='<button class="btn green" onclick="doDaemon(&quot;start&quot;)">Start</button>';h+='<button class="btn red" onclick="doDaemon(&quot;stop&quot;)">Stop</button>';h+='<button class="btn blue" onclick="doDaemon(&quot;status&quot;)">Status</button>';h+='<div id="daemon-msg"></div>';$('p-daemon').innerHTML=h}
function doDaemon(a){api('/daemon/'+a,'POST').then(function(d){$('daemon-msg').innerHTML='<div class="msg">'+(d.msg||'')+'</div>'})}

/* ---- alert test ---- */
function AT(){var h='<h2>Alert Test</h2><button class="btn red" onclick="doAlertTest()">Trigger Alert</button><div id="alert-msg"></div>';$('p-alert-test').innerHTML=h}
function doAlertTest(){api('/alert/test','POST').then(function(d){$('alert-msg').innerHTML='<div class="msg">'+(d.msg||'')+'</div>'})}

/* ---- compare ---- */
function CMP(){var h='<h2>Compare</h2><div class="toolbar"><div class="seg">';h+='<span class="on" onclick="doCMP(&quot;1h&quot;,this)">1h</span>';h+='<span onclick="doCMP(&quot;24h&quot;,this)">24h</span>';h+='<span onclick="doCMP(&quot;7d&quot;,this)">7d</span>';h+='</div></div><div id="cmp-r"></div>';$('p-compare').innerHTML=h}
function doCMP(range,btn){var bs=document.querySelectorAll('#p-compare .seg span');for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');if(btn)btn.classList.add('on');api('/current').then(function(cur){if(!cur)return;api('/data?range='+range).then(function(d){var c=$('cmp-r');if(!d||!d.times||!d.times.length){c.innerHTML='<div class="empty"><h3>Not enough data</h3></div>';return}var n=d.times.length;var avg=function(a){var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length};var mx=function(a){return Math.max.apply(null,a)};var h='<table><tr><th>Metric</th><th>Current</th><th>Avg</th><th>Peak</th><th>Samples</th></tr>';var ks=['cpu','memory','disk'],ns=['CPU','Memory','Disk'];for(var i=0;i<ks.length;i++){var cv=cur[ks[i]]||0,av=avg(d[ks[i]]),mv=mx(d[ks[i]]);h+='<tr><td>'+ns[i]+'</td><td>'+cv.toFixed(1)+'%</td><td>'+av.toFixed(1)+'%</td><td>'+mv.toFixed(1)+'%</td><td>'+n+'</td></tr>'}h+='</table>';c.innerHTML=h})})}

/* ---- launcher ---- */
function LA(){api('/launcher/list').then(function(d){var h='<h2>Launcher</h2>';if(!d||!Array.isArray(d)||!d.length){h+='<div class="empty"><h3>No shortcuts</h3></div>'}else{h+='<table><tr><th>#</th><th>Name</th><th>Path</th><th></th></tr>';for(var i=0;i<d.length;i++){h+='<tr><td>'+(i+1)+'</td><td>'+d[i].name+'</td><td style="font-size:12px;color:var(--fg3)">'+d[i].path+'</td><td><button class="btn blue" onclick="doLaunch('+i+')">Launch</button></td></tr>'}h+='</table>'}h+='<div class="msg" style="margin-top:16px"><input id="ln-name" placeholder="Name"><input id="ln-path" placeholder="Path"><button class="btn green" onclick="doAddLaunch()">Add</button></div><div id="ln-msg"></div>';$('p-launcher').innerHTML=h}).catch(function(){showEmpty('launcher')})}
function doLaunch(i){api('/launcher/launch','POST',{index:i}).then(function(d){$('ln-msg').innerHTML='<div class="msg">'+(d.msg||'')+'</div>'})}
function doAddLaunch(){var n=$('ln-name').value.trim(),p=$('ln-path').value.trim();if(!n||!p)return;api('/launcher/add','POST',{name:n,path:p}).then(function(d){$('ln-msg').innerHTML='<div class="msg">'+(d.msg||'')+'</div>';LA()})}

/* ---- report ---- */
function RP(){var h='<h2>Report</h2><div class="toolbar"><div class="seg">';h+='<span class="on" onclick="doRP(&quot;1h&quot;,this)">1h</span>';h+='<span onclick="doRP(&quot;6h&quot;,this)">6h</span>';h+='<span onclick="doRP(&quot;24h&quot;,this)">24h</span>';h+='<span onclick="doRP(&quot;7d&quot;,this)">7d</span>';h+='</div></div><div id="rp-msg"></div>';$('p-report').innerHTML=h}
function doRP(range,btn){var bs=document.querySelectorAll('#p-report .seg span');for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');if(btn)btn.classList.add('on');$('rp-msg').innerHTML='<div class="empty"><p style="color:var(--fg2)">Generating...</p></div>';api('/report/generate?range='+range).then(function(d){if(!d)return;$('rp-msg').innerHTML='<div class="msg">'+(d.msg||'')+'</div><div class="msg" style="margin-top:8px;max-height:500px;overflow-y:auto">'+(d.stats||'')+'</div>'})}

/* ---- boot ---- */
document.addEventListener('DOMContentLoaded',function(){
    H();
    setInterval(function(){try{RF()}catch(e){}},30000);
    var as=document.querySelectorAll('.side a[data-panel]');
    for(var i=0;i<as.length;i++)as[i].addEventListener('click',function(e){e.preventDefault();loadPanel(this.getAttribute('data-panel'))})
});

/* ---- plotly async ---- */
(function(){var s=document.createElement('script');s.src='https://cdn.plot.ly/plotly-2.32.0.min.js';s.onload=function(){PLOTLY_READY=true;if(CP==='home')CH(CR)};s.onerror=function(){var el=$('chart');if(el)el.innerHTML='<div class="empty"><h3>Plotly unavailable</h3></div>';console.warn('Plotly CDN failed')};setTimeout(function(){document.head.appendChild(s)},100)})();
</script>

</body>
</html>
